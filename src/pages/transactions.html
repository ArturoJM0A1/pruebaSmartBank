<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transacciones - SmartBank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/variables.css">
  <link rel="stylesheet" href="../styles/reset.css">
  <link rel="stylesheet" href="../styles/typography.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/animations.css">
  <link rel="stylesheet" href="../styles/utilities.css">
  <link rel="stylesheet" href="../styles/responsive.css">
  <link rel="stylesheet" href="../styles/dark-theme.css">
  <style>
    /* 
      Transaction History Page:
      Data tables with filtering, sorting, and pagination.
      WHY this design? Financial data requires:
      - Scannability (scan for specific transactions)
      - Filtering (narrow down by date, type, amount)
      - Detail on demand (click for full transaction info)
    */
    .page-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--spacing-6);flex-wrap:wrap;gap:var(--spacing-4); }
    .page-title { font-size:var(--font-size-2xl);font-weight:var(--font-weight-bold);color:var(--color-gray-800); }

    /* Filter bar */
    .filter-bar {
      display: flex; flex-wrap: wrap; gap: var(--spacing-3);
      padding: var(--spacing-4) var(--spacing-6);
      background: var(--color-gray-0);
      border: 1px solid var(--color-gray-200);
      border-radius: var(--radius-xl);
      margin-bottom: var(--spacing-6);
      align-items: flex-end;
    }

    .filter-group {
      display: flex; flex-direction: column; gap: var(--spacing-1);
      flex: 1; min-width: 150px;
    }

    .filter-label {
      font-size: var(--font-size-xs); color: var(--color-gray-500);
      text-transform: uppercase; letter-spacing: 0.05em; font-weight: var(--font-weight-medium);
    }

    .filter-input {
      height: 36px; padding: 0 var(--spacing-3);
      border: 1px solid var(--color-gray-300); border-radius: var(--radius-md);
      font-size: var(--font-size-sm); background: var(--color-gray-0);
    }

    .filter-input:focus { outline:none; border-color:var(--color-primary-500); box-shadow:0 0 0 3px var(--color-primary-100); }

    .filter-actions { display:flex; gap:var(--spacing-2); align-items:flex-end; }

    /* Transaction table */
    .transactions-table-wrap {
      background: var(--color-gray-0);
      border: 1px solid var(--color-gray-200);
      border-radius: var(--radius-xl);
      overflow: hidden;
    }

    .table-responsive { overflow-x: auto; }

    .data-table { width:100%; border-collapse:collapse; font-size:var(--font-size-sm); }
    .data-table th {
      padding:var(--spacing-3) var(--spacing-4); text-align:left;
      font-weight:var(--font-weight-semibold); color:var(--color-gray-600);
      background:var(--color-gray-50); border-bottom:2px solid var(--color-gray-200);
      white-space:nowrap; cursor:pointer; user-select:none;
    }
    .data-table th:hover { color:var(--color-gray-800); }
    .data-table td { padding:var(--spacing-3) var(--spacing-4); border-bottom:1px solid var(--color-gray-100); color:var(--color-gray-700); }
    .data-table tbody tr { transition:background var(--transition-fast); cursor:pointer; }
    .data-table tbody tr:hover { background:var(--color-gray-50); }

    .tx-type-badge {
      display:inline-flex;align-items:center;gap:var(--spacing-1);
      padding:var(--spacing-1) var(--spacing-2);border-radius:var(--radius-full);
      font-size:var(--font-size-xs);font-weight:var(--font-weight-medium);
    }
    .tx-type-badge.income { background:var(--color-success-50);color:var(--color-success-600); }
    .tx-type-badge.expense { background:var(--color-danger-50);color:var(--color-danger-600); }
    .tx-type-badge.transfer { background:var(--color-info-50);color:var(--color-info-600); }

    .tx-amount { font-weight:var(--font-weight-semibold);white-space:nowrap; }
    .tx-amount.positive { color:var(--color-success-600); }
    .tx-amount.negative { color:var(--color-gray-800); }

    /* Pagination */
    .table-footer {
      display:flex;align-items:center;justify-content:space-between;
      padding:var(--spacing-4) var(--spacing-6);border-top:1px solid var(--color-gray-100);
      flex-wrap:wrap;gap:var(--spacing-3);
    }

    .table-info { font-size:var(--font-size-sm);color:var(--color-gray-500); }

    .pagination { display:flex;gap:var(--spacing-1); }
    .page-btn {
      display:flex;align-items:center;justify-content:center;
      min-width:32px;height:32px;padding:0 var(--spacing-2);
      border:1px solid var(--color-gray-200);border-radius:var(--radius-md);
      background:var(--color-gray-0);color:var(--color-gray-600);
      font-size:var(--font-size-sm);transition:all var(--transition-fast);cursor:pointer;
    }
    .page-btn:hover:not(:disabled) { background:var(--color-gray-50);border-color:var(--color-gray-300); }
    .page-btn.active { background:var(--color-primary-600);border-color:var(--color-primary-600);color:white; }
    .page-btn:disabled { opacity:0.5;cursor:not-allowed; }

    /* Transaction detail modal */
    .modal-bg { position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:none;align-items:center;justify-content:center;padding:var(--spacing-4); }
    .modal-bg.active { display:flex; }
    .modal-box { background:var(--color-gray-0);border-radius:var(--radius-xl);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:scaleIn 0.2s ease-out; }
    .modal-hdr { display:flex;align-items:center;justify-content:space-between;padding:var(--spacing-5) var(--spacing-6);border-bottom:1px solid var(--color-gray-100); }
    .modal-bdy { padding:var(--spacing-6); }
    .d-row { display:flex;justify-content:space-between;padding:var(--spacing-3) 0;border-bottom:1px solid var(--color-gray-50); }
    .d-label { font-size:var(--font-size-sm);color:var(--color-gray-500); }
    .d-value { font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);color:var(--color-gray-800); }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="app-sidebar" id="sidebar" aria-label="Menú">
      <div style="padding:var(--spacing-6);">
        <div style="display:flex;align-items:center;gap:var(--spacing-3);margin-bottom:var(--spacing-8);">
          <svg width="32" height="32" viewBox="0 0 80 80" fill="none"><rect width="80" height="80" rx="16" fill="#3b82f6"/><path d="M20 55V30L40 20L60 30V55" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path d="M30 55V40H50V55" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="40" cy="33" r="4" stroke="white" stroke-width="2"/></svg>
          <span style="font-size:var(--font-size-xl);font-weight:var(--font-weight-bold);color:white;">SmartBank</span>
        </div>
        <nav><ul style="display:flex;flex-direction:column;gap:var(--spacing-1);">
          <li><a href="dashboard.html" class="sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a></li>
          <li><a href="accounts.html" class="sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>Cuentas</a></li>
          <li><a href="cards.html" class="sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Tarjetas</a></li>
          <li><a href="transfers.html" class="sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>Transferencias</a></li>
          <li><a href="services.html" class="sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Servicios</a></li>
          <li><a href="beneficiaries.html" class="sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Beneficiarios</a></li>
        </ul></nav>
      </div>
      <style>.sidebar-link{display:flex;align-items:center;gap:var(--spacing-3);padding:var(--spacing-3) var(--spacing-4);border-radius:var(--radius-md);color:rgba(255,255,255,0.6);font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);text-decoration:none;transition:all var(--transition-fast);}.sidebar-link:hover{background:rgba(255,255,255,0.1);color:white;}.sidebar-link.active{background:var(--color-primary-600);color:white;}</style>
    </aside>

    <header class="app-header">
      <div style="display:flex;align-items:center;gap:var(--spacing-4);">
        <button class="hide-desktop" onclick="document.getElementById('sidebar').classList.toggle('open')" aria-label="Menú"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h2 style="font-size:var(--font-size-lg);font-weight:var(--font-weight-semibold);color:var(--color-gray-800);">Transacciones</h2>
      </div>
      <div style="display:flex;align-items:center;gap:var(--spacing-4);">
        <button style="position:relative;padding:var(--spacing-2);border-radius:var(--radius-md);color:var(--color-gray-500);" aria-label="Notificaciones"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg></button>
        <div style="width:36px;height:36px;border-radius:50%;background:var(--color-primary-100);color:var(--color-primary-600);display:flex;align-items:center;justify-content:center;font-weight:var(--font-weight-semibold);font-size:var(--font-size-sm);">JP</div>
      </div>
    </header>

    <main class="app-main">
      <div class="page-header">
        <h1 class="page-title">Historial de transacciones</h1>
        <button class="btn btn-secondary" onclick="exportData()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exportar
        </button>
      </div>

      <!-- Filters -->
      <div class="filter-bar" role="search" aria-label="Filtros de transacciones">
        <div class="filter-group">
          <label class="filter-label" for="filterSearch">Buscar</label>
          <input class="filter-input" type="search" id="filterSearch" placeholder="Nombre o referencia..." oninput="applyFilters()">
        </div>
        <div class="filter-group">
          <label class="filter-label" for="filterDateFrom">Desde</label>
          <input class="filter-input" type="date" id="filterDateFrom" onchange="applyFilters()">
        </div>
        <div class="filter-group">
          <label class="filter-label" for="filterDateTo">Hasta</label>
          <input class="filter-input" type="date" id="filterDateTo" onchange="applyFilters()">
        </div>
        <div class="filter-group">
          <label class="filter-label" for="filterType">Tipo</label>
          <select class="filter-input" id="filterType" onchange="applyFilters()">
            <option value="">Todos</option>
            <option value="income">Ingresos</option>
            <option value="expense">Gastos</option>
            <option value="transfer">Transferencias</option>
          </select>
        </div>
        <div class="filter-group">
          <label class="filter-label" for="filterAccount">Cuenta</label>
          <select class="filter-input" id="filterAccount" onchange="applyFilters()">
            <option value="">Todas</option>
            <option value="checking">Corriente ••4523</option>
            <option value="savings">Ahorro ••7891</option>
          </select>
        </div>
        <div class="filter-actions">
          <button class="btn btn-ghost btn-sm" onclick="clearFilters()">Limpiar</button>
        </div>
      </div>

      <!-- Table -->
      <div class="transactions-table-wrap">
        <div class="table-responsive">
          <table class="data-table" aria-label="Lista de transacciones">
            <thead>
              <tr>
                <th onclick="sortTable('date')">Fecha ↕</th>
                <th onclick="sortTable('description')">Descripción ↕</th>
                <th>Tipo</th>
                <th>Cuenta</th>
                <th onclick="sortTable('amount')">Monto ↕</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody id="txTableBody">
              <!-- Populated by JavaScript -->
            </tbody>
          </table>
        </div>

        <div class="table-footer">
          <div class="table-info" id="tableInfo">Mostrando 1-10 de 25 transacciones</div>
          <div class="pagination" id="pagination">
            <!-- Populated by JavaScript -->
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Transaction detail modal -->
  <div class="modal-bg" id="txModal" onclick="if(event.target===this)closeTxModal()">
    <div class="modal-box">
      <div class="modal-hdr">
        <h3 style="font-size:var(--font-size-lg);font-weight:var(--font-weight-semibold);">Detalle de transacción</h3>
        <button onclick="closeTxModal()" style="padding:var(--spacing-2);border-radius:var(--radius-md);color:var(--color-gray-400);" aria-label="Cerrar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="modal-bdy" id="txDetailContent"></div>
      <div style="padding:var(--spacing-4) var(--spacing-6);border-top:1px solid var(--color-gray-100);display:flex;justify-content:flex-end;">
        <button class="btn btn-secondary btn-sm" onclick="closeTxModal()">Cerrar</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <script>
    // Transaction data - in production, this comes from an API
    const transactions = [
      { id: 1, date: '2024-06-21', description: 'Uber Eats', type: 'expense', category: 'Alimentación', account: 'checking', amount: -245.00, status: 'completed', reference: 'TXN-001234' },
      { id: 2, date: '2024-06-20', description: 'Depósito nómina', type: 'income', category: 'Salario', account: 'checking', amount: 15000.00, status: 'completed', reference: 'TXN-001235' },
      { id: 3, date: '2024-06-20', description: 'Transferencia a María López', type: 'transfer', category: 'Transferencia', account: 'checking', amount: -2500.00, status: 'completed', reference: 'TXN-001236' },
      { id: 4, date: '2024-06-19', description: 'CFE - Electricidad', type: 'expense', category: 'Servicios', account: 'checking', amount: -850.00, status: 'completed', reference: 'TXN-001237' },
      { id: 5, date: '2024-06-18', description: 'Walmart', type: 'expense', category: 'Compras', account: 'checking', amount: -1230.00, status: 'completed', reference: 'TXN-001238' },
      { id: 6, date: '2024-06-17', description: 'Depósito ATM', type: 'income', category: 'Depósito', account: 'savings', amount: 5000.00, status: 'completed', reference: 'TXN-001239' },
      { id: 7, date: '2024-06-16', description: 'Netflix', type: 'expense', category: 'Entretenimiento', account: 'checking', amount: -299.00, status: 'completed', reference: 'TXN-001240' },
      { id: 8, date: '2024-06-15', description: 'Oxxo', type: 'expense', category: 'Alimentación', account: 'checking', amount: -156.50, status: 'completed', reference: 'TXN-001241' },
      { id: 9, date: '2024-06-14', description: 'Transferencia de Carlos Ruiz', type: 'transfer', category: 'Transferencia', account: 'checking', amount: 3200.00, status: 'completed', reference: 'TXN-001242' },
      { id: 10, date: '2024-06-13', description: 'Spotify', type: 'expense', category: 'Entretenimiento', account: 'checking', amount: -169.00, status: 'completed', reference: 'TXN-001243' },
      { id: 11, date: '2024-06-12', description: 'Farmacia Guadalajara', type: 'expense', category: 'Salud', account: 'checking', amount: -450.00, status: 'completed', reference: 'TXN-001244' },
      { id: 12, date: '2024-06-11', description: 'Gasolina PEMEX', type: 'expense', category: 'Transporte', account: 'checking', amount: -800.00, status: 'completed', reference: 'TXN-001245' },
    ];

    let currentPage = 1;
    const perPage = 10;
    let filteredTx = [...transactions];

    function renderTable() {
      const start = (currentPage - 1) * perPage;
      const end = start + perPage;
      const pageData = filteredTx.slice(start, end);

      document.getElementById('txTableBody').innerHTML = pageData.map(tx => `
        <tr onclick="showTxDetail(${tx.id})" tabindex="0" role="button" aria-label="Ver detalle de ${tx.description}">
          <td>${formatDate(tx.date)}</td>
          <td><strong>${tx.description}</strong><br><span style="font-size:var(--font-size-xs);color:var(--color-gray-400);">${tx.category}</span></td>
          <td><span class="tx-type-badge ${tx.type}">${tx.type === 'income' ? 'Ingreso' : tx.type === 'expense' ? 'Gasto' : 'Transferencia'}</span></td>
          <td>${tx.account === 'checking' ? 'Corriente ••4523' : 'Ahorro ••7891'}</td>
          <td class="tx-amount ${tx.amount >= 0 ? 'positive' : 'negative'}">${tx.amount >= 0 ? '+' : ''}$${Math.abs(tx.amount).toLocaleString('es-MX', {minimumFractionDigits:2})}</td>
          <td><span class="badge badge-success">Completada</span></td>
        </tr>
      `).join('');

      document.getElementById('tableInfo').textContent = `Mostrando ${start+1}-${Math.min(end, filteredTx.length)} de ${filteredTx.length} transacciones`;
      renderPagination();
    }

    function renderPagination() {
      const totalPages = Math.ceil(filteredTx.length / perPage);
      let html = `<button class="page-btn" onclick="goToPage(${currentPage-1})" ${currentPage===1?'disabled':''}>&lt;</button>`;
      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goToPage(${i})">${i}</button>`;
      }
      html += `<button class="page-btn" onclick="goToPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>&gt;</button>`;
      document.getElementById('pagination').innerHTML = html;
    }

    function goToPage(page) {
      const totalPages = Math.ceil(filteredTx.length / perPage);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      renderTable();
    }

    function applyFilters() {
      const search = document.getElementById('filterSearch').value.toLowerCase();
      const type = document.getElementById('filterType').value;
      const account = document.getElementById('filterAccount').value;
      const dateFrom = document.getElementById('filterDateFrom').value;
      const dateTo = document.getElementById('filterDateTo').value;

      filteredTx = transactions.filter(tx => {
        if (search && !tx.description.toLowerCase().includes(search) && !tx.reference.toLowerCase().includes(search)) return false;
        if (type && tx.type !== type) return false;
        if (account && tx.account !== account) return false;
        if (dateFrom && tx.date < dateFrom) return false;
        if (dateTo && tx.date > dateTo) return false;
        return true;
      });

      currentPage = 1;
      renderTable();
    }

    function clearFilters() {
      document.getElementById('filterSearch').value = '';
      document.getElementById('filterDateFrom').value = '';
      document.getElementById('filterDateTo').value = '';
      document.getElementById('filterType').value = '';
      document.getElementById('filterAccount').value = '';
      filteredTx = [...transactions];
      currentPage = 1;
      renderTable();
    }

    function sortTable(field) {
      filteredTx.sort((a, b) => {
        if (field === 'date') return b.date.localeCompare(a.date);
        if (field === 'description') return a.description.localeCompare(b.description);
        if (field === 'amount') return b.amount - a.amount;
        return 0;
      });
      renderTable();
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('es-MX', { day:'numeric', month:'short', year:'numeric' });
    }

    function showTxDetail(id) {
      const tx = transactions.find(t => t.id === id);
      if (!tx) return;
      document.getElementById('txDetailContent').innerHTML = `
        <div style="text-align:center;margin-bottom:var(--spacing-6);">
          <div style="font-size:var(--font-size-3xl);font-weight:var(--font-weight-bold);color:${tx.amount>=0?'var(--color-success-600)':'var(--color-gray-800)'};">${tx.amount>=0?'+':''}$${Math.abs(tx.amount).toLocaleString('es-MX',{minimumFractionDigits:2})}</div>
          <div style="color:var(--color-gray-500);font-size:var(--font-size-sm);margin-top:var(--spacing-1);">${tx.description}</div>
        </div>
        <div class="d-row"><span class="d-label">Fecha</span><span class="d-value">${formatDate(tx.date)}</span></div>
        <div class="d-row"><span class="d-label">Tipo</span><span class="d-value">${tx.type==='income'?'Ingreso':tx.type==='expense'?'Gasto':'Transferencia'}</span></div>
        <div class="d-row"><span class="d-label">Categoría</span><span class="d-value">${tx.category}</span></div>
        <div class="d-row"><span class="d-label">Cuenta</span><span class="d-value">${tx.account==='checking'?'Corriente ••4523':'Ahorro ••7891'}</span></div>
        <div class="d-row"><span class="d-label">Referencia</span><span class="d-value" style="font-family:var(--font-family-mono);">${tx.reference}</span></div>
        <div class="d-row"><span class="d-label">Estado</span><span class="d-value"><span class="badge badge-success">Completada</span></span></div>
      `;
      document.getElementById('txModal').classList.add('active');
    }

    function closeTxModal() { document.getElementById('txModal').classList.remove('active'); }

    function exportData() {
      showToast('Exportar', 'Funcionalidad de exportación en desarrollo', 'info');
    }

    function showToast(title, message, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `<div class="toast-content"><div class="toast-title">${title}</div><div class="toast-message">${message}</div></div>`;
      container.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add('show'));
      setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 4000);
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTxModal(); });
    renderTable();
  </script>
</body>
</html>
